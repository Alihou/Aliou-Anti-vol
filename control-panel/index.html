<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Console — Sécurité Perso</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #15171A;
    --panel: #1D2024;
    --panel-border: #2A2E33;
    --amber: #E8A33D;
    --amber-dim: #8C6626;
    --text: #E5E3DD;
    --text-dim: #8A8D91;
    --danger: #C4553D;
    --ok: #6FA987;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .console {
    width: 100%;
    max-width: 420px;
  }
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: 15px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber);
    margin: 0;
    font-weight: 600;
  }
  .led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    display: inline-block;
  }
  .led.on { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .sub {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 28px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .panel-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  input {
    width: 100%;
    background: #0F1113;
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 3px;
    margin-bottom: 10px;
  }
  input:focus { outline: none; border-color: var(--amber-dim); }
  input::placeholder { color: #55585C; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  button.cmd {
    background: #22262B;
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 16px 10px;
    border-radius: 3px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s;
  }
  button.cmd:hover { border-color: var(--amber-dim); }
  button.cmd .n {
    display: block;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  button.cmd.danger { border-color: #4a2b23; }
  button.cmd.danger:hover { border-color: var(--danger); }
  button.cmd.danger .label { color: var(--danger); }

  .save-btn {
    width: 100%;
    background: var(--amber-dim);
    border: none;
    color: #1A1204;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    padding: 12px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.04em;
  }

  .footer-note {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-top: 20px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #22262B;
    border: 1px solid var(--amber-dim);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 4px;
    font-size: 12px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="console">
  <div class="header">
    <h1>Sécurité Perso</h1>
    <span class="led" id="statusLed"></span>
  </div>
  <div class="sub" id="statusText">Non configuré</div>

  <div class="panel">
    <div class="panel-label">Réglages</div>
    <input id="ownerPhone" type="tel" placeholder="Numéro du téléphone à protéger (+223...)">
    <input id="pin" type="text" placeholder="Code PIN secret">
    <button class="save-btn" onclick="saveConfig()">Enregistrer sur cet appareil</button>
  </div>

  <div class="panel">
    <div class="panel-label">Commandes</div>
    <div class="grid">
      <button class="cmd" onclick="sendCommand('LOCALISER')">
        <span class="n">01</span>
        <span class="label">Localiser</span>
      </button>
      <button class="cmd" onclick="sendCommand('VERROUILLER')">
        <span class="n">02</span>
        <span class="label">Verrouiller</span>
      </button>
      <button class="cmd" onclick="sendCommand('ALARME')">
        <span class="n">03</span>
        <span class="label">Alarme sonore</span>
      </button>
      <button class="cmd" onclick="sendCommand('PHOTO')">
        <span class="n">04</span>
        <span class="label">Photo discrète</span>
      </button>
      <button class="cmd" onclick="sendCommand('BATTERIE')">
        <span class="n">05</span>
        <span class="label">Niveau batterie</span>
      </button>
      <button class="cmd danger" onclick="confirmWipe()">
        <span class="n">06</span>
        <span class="label">Effacer tout</span>
      </button>
    </div>
  </div>

  <div class="footer-note">
    Chaque bouton ouvre ton app SMS avec un message pré-rempli — il ne reste
    qu'à appuyer sur envoyer. Aucune donnée ne transite par un serveur : tout
    passe par le réseau SMS classique, y compris sans connexion data.
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function loadConfig() {
  const phone = localStorage.getItem('av_phone') || '';
  const pin = localStorage.getItem('av_pin') || '';
  document.getElementById('ownerPhone').value = phone;
  document.getElementById('pin').value = pin;
  updateStatus();
}

function updateStatus() {
  const phone = localStorage.getItem('av_phone');
  const pin = localStorage.getItem('av_pin');
  const led = document.getElementById('statusLed');
  const text = document.getElementById('statusText');
  if (phone && pin) {
    led.classList.add('on');
    text.textContent = 'Prêt — ' + phone;
  } else {
    led.classList.remove('on');
    text.textContent = 'Non configuré';
  }
}

function saveConfig() {
  const phone = document.getElementById('ownerPhone').value.trim();
  const pin = document.getElementById('pin').value.trim();
  if (!phone || !pin) {
    showToast('Renseigne le numéro et le PIN.');
    return;
  }
  localStorage.setItem('av_phone', phone);
  localStorage.setItem('av_pin', pin);
  updateStatus();
  showToast('Configuration enregistrée sur cet appareil.');
}

function sendCommand(cmd, arg) {
  const phone = localStorage.getItem('av_phone');
  const pin = localStorage.getItem('av_pin');
  if (!phone || !pin) {
    showToast('Configure d\'abord le numéro et le PIN.');
    return;
  }
  let body = `AV:${pin}:${cmd}`;
  if (arg) body += `:${arg}`;
  const url = `sms:${phone}?body=${encodeURIComponent(body)}`;
  window.location.href = url;
}

function confirmWipe() {
  if (confirm('Ceci efface TOUTES les données du téléphone. Action irréversible. Confirmer ?')) {
    sendCommand('EFFACER', 'CONFIRMER');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadConfig();
</script>

</body>
</html>
